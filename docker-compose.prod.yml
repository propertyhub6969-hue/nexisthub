services:
  db:
    image: postgres:16-alpine
    container_name: nexisthub_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexisthub_net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexisthub_backend
    restart: always
    env_file: .env
    environment:
      POSTGRES_HOST: db
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2"
    networks:
      - nexisthub_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexisthub_frontend
    restart: always
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.nexisthub.rule=Host(`app.nexisthub.id`)"
      - "traefik.http.routers.nexisthub.entrypoints=http"
      - "traefik.http.routers.nexisthub.middlewares=nexisthub-https"
      - "traefik.http.middlewares.nexisthub-https.redirectscheme.scheme=https"
      - "traefik.http.routers.nexisthub-secure.rule=Host(`app.nexisthub.id`)"
      - "traefik.http.routers.nexisthub-secure.entrypoints=https"
      - "traefik.http.routers.nexisthub-secure.tls=true"
      - "traefik.http.routers.nexisthub-secure.tls.certresolver=letsencrypt"
      - "traefik.http.services.nexisthub.loadbalancer.server.port=80"
    networks:
      - nexisthub_net
      - coolify

volumes:
  postgres_data:

networks:
  nexisthub_net:
    name: nexisthub_network
  coolify:
    external: true
