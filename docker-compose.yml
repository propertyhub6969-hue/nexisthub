version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: nexisthub_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nexist_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-erp_password_change_this}
      POSTGRES_DB: ${POSTGRES_DB:-nexisthub_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexist_user} -d ${POSTGRES_DB:-nexisthub_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: nexisthub_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:

networks:
  default:
    name: nexisthub_network
